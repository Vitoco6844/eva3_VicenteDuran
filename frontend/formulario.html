<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./css/brite.css">
    <link rel="stylesheet" href="./css/estilos.css">
    <link rel="shortcut icon" href="./assets/images/among_us_player_red_icon_156942.png" type="image/x-icon">
    <link href="https://cdn.datatables.net/v/dt/dt-2.3.8/datatables.min.css" rel="stylesheet"
        integrity="sha384-1BvCnyKidMPIGQGjvMn+w+90hHBhYJtF+R7os4NX2Abe7tSxWQadHRTSH5qb559A" crossorigin="anonymous">


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <!-- <script src="./scripts/jQuery v4.0.0.js"></script> -->
    <script src="https://cdn.datatables.net/v/dt/dt-2.3.8/datatables.min.js"
        integrity="sha384-kjkli48Tmhwhaghq0IIRm8gFmMdnihfu1ywAOyyGWYMsoZZi/6AX2fWzpsqahoFw"
        crossorigin="anonymous"></script>
        <script src="./scripts/formulario.js"></script>

    <title>Formulario Registro</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="light">
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a href="./inicio.html" class="nav-link">Inicio</a></li>
                <li class="nav-item"><a href="./formulario.html" class="nav-link">Formulario de Registro</a></li>
            </ul>
        </div>
    </nav>

    <div class="container principal">
        <form id="registroUsuario">
            <p class="h3">Formulario de Registro</p>
            <br>
            <div class="container">
                <p class="h5">Datos Personales</p>
                <hr>
                <div class="row">
                    <div class="col">
                        <label for="inputNombre" class="form-label">Nombre Completo:</label>
                        <input type="text" name="nombre" id="inputNombre" class="form-control"
                            onchange="validarCampo(this)">
                    </div>
                    <div class="col">
                        <label for="inputEmail" class="form-label">Correo Electrónico:</label>
                        <input type="email" name="email" id="inputEmail" class="form-control"
                            onchange="validarEmail(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputRut" class="form-label">Rut:</label>
                        <input type="text" name="rut" id="inputRut" class="form-control" onchange="validarRut(this)">
                    </div>
                    <div class="col">
                        <label for="inputTelefono" class="form-label">Fono Contacto:</label>
                        <input type="tel" name="telefono" id="inputTelefono" class="form-control"
                            onchange="validarCampo(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputContrasena" class="form-label">Ingrese Contraseña:</label>
                        <input type="password" name="contrasena" id="inputContrasena" class="form-control"
                            onchange="validarContrasena(this)">
                    </div>
                    <div class="col">
                        <label for="inputRepetirContrasena" class="form-label">Repita Contraseña:</label>
                        <input type="password" name="" id="inputRepetirContrasena" class="form-control"
                            onchange="validarRepetirContrasena(this,document.getElementById('inputContrasena'))">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputFechaNac" class="form-label">Fecha Nacimiento:</label>
                        <input type="date" name="nacimiento" id="inputFechaNac" class="form-control"
                            onchange="validarCampo(this)">
                    </div>

                    <div class="col">
                        <label for="selectGenero" class="form-label">Seleccione su Género:</label>
                        <select name="genero" id="selectGenero" class="form-select">
                            <option value="" selected>Seleccione su género</option>
                            <option value="F">Femenino</option>
                            <option value="M">Mascullino</option>
                            <option value="O">Otro</option>
                        </select>
                    </div>
                    
                    <div class="col">
                        <label for="selectPais" class="form-label">Seleccione su País:</label>
                        <select name="nacionalidad" id="selectPais" class="form-select" onchange="validarCampo(this)">
                            <option value="" selected>Seleccione un país</option>
                        </select>
                    </div>
                </div>
                <br>
                <p class="h5">Dirección</p>
                <hr>

                <div class="row">
                    <div class="col">
                        <label for="selectComuna" class="form-label">Comuna:</label>
                        <select name="comuna" id="selectComuna" onchange="validarCampo(this)" class="form-select">
                            <option value="" selected>Seleccione su comuna</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="inputCalle" class="form-label">Calle:</label>
                        <input type="text" name="calle" id="inputCalle" class="form-control"
                            onchange="validarCampo(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputNumero" class="form-label">Número:</label>
                        <input type="text" name="numero" id="inputNumero" class="form-control">
                    </div>
                    <div class="col">
                        <label for="inputDepartamento" class="form-label">Departamento/Oficina:</label>
                        <input type="text" name="departamento" id="inputDepartamento" class="form-control">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <input type="reset" class="btn btn-secondary me-2" value="Cancelar">
                        <button type="button" class="btn btn-primary" value="Enviar"
                            onclick="validarFormulario()">Enviar</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
